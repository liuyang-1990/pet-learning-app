services:
  pet-learning-app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_PATH: /app/data/pet-learning.sqlite
      APP_UPLOAD_DIR: /app/public/uploads
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TEXT_MODEL: ${OPENAI_TEXT_MODEL:-gpt-4.1-mini}
      OPENAI_TRANSCRIBE_MODEL: ${OPENAI_TRANSCRIBE_MODEL:-gpt-4o-mini-transcribe}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-alloy}
      GUARDIAN_PIN: ${GUARDIAN_PIN:-123456}
      LEARNER_ENTRY_CODE: ${LEARNER_ENTRY_CODE:-123456}
    volumes:
      - pet_data:/app/data
      - pet_uploads:/app/public/uploads

volumes:
  pet_data:
  pet_uploads:
